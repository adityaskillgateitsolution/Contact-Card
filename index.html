<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aditya SkillGate</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <!-- Logo Intro Animation -->
    <div class="logo-intro" id="logoIntro">
        <div class="intro-logo-container">
            <img src="favicon.png" alt="Logo" class="intro-favicon" id="introFavicon" />
        </div>
    </div>

    <!-- Background Decorative Elements -->
    <div class="bg-decoration">
        <div class="bg-circle bg-circle-1"></div>
        <div class="bg-circle bg-circle-2"></div>
        <div class="bg-circle bg-circle-3"></div>
        <div class="bg-pattern"></div>

        <!-- Sparkling Tech Particles -->
        <div class="tech-particles">
            <div class="particle p1"></div>
            <div class="particle p2"></div>
            <div class="particle p3"></div>
            <div class="particle p4"></div>
            <div class="particle p5"></div>
            <div class="particle p6"></div>
        </div>

        <!-- Decorative Circuit Lines -->
        <div class="circuit-decoration">
            <div class="circuit-line cl-1"></div>
            <div class="circuit-line cl-2"></div>
            <div class="circuit-line cl-3"></div>
        </div>

        <!-- Floating Tech Icons (SVG) -->
        <div class="tech-icons">
            <div class="tech-icon icon-1">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M16 18l6-6-6-6M8 6l-6 6 6 6"></path>
                </svg>
            </div>
            <div class="tech-icon icon-2">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"></path>
                </svg>
            </div>
            <div class="tech-icon icon-3">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="4" y="4" width="16" height="16" rx="2" />
                    <rect x="9" y="9" width="6" height="6" />
                </svg>
            </div>
            <div class="tech-icon icon-4">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <ellipse cx="12" cy="5" rx="9" ry="3" />
                    <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5" />
                    <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3" />
                </svg>
            </div>
            <div class="tech-icon icon-5">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M4 17l6-6-6-6M12 19h8"></path>
                </svg>
            </div>
            <!-- More icons for density -->
            <div class="tech-icon icon-6">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                </svg>
            </div>
            <div class="tech-icon icon-7">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
                </svg>
            </div>
        </div>
    </div>
